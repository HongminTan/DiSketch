# DiSketch 仿真配置示例
pcap=../datasets/caida_600w.pcap
sketch_kind=CountSketch
epoch_ns=100000000
max_epochs=4
aggregated_depth=8
heavy_ratio=0.0005
max_flow_report=20

[fragment]
name=edge_a
kind=CountSketch
memory=131072
depth=4
initial_subepoch=2
max_subepoch=16
rho_target=120.0
boost_single_hop=1
background_ratio=0.5

[fragment]
name=core
kind=CountSketch
memory=262144
depth=4
initial_subepoch=2
max_subepoch=16
rho_target=80.0
boost_single_hop=0
background_ratio=0.2

[fragment]
name=edge_b
kind=CountSketch
memory=131072
depth=4
initial_subepoch=2
max_subepoch=16
rho_target=120.0
boost_single_hop=1
background_ratio=0.5

[path]
name=edge-core-edge
nodes=edge_a,core,edge_b

[path]
name=edge-direct
nodes=edge_a,edge_b
